  @keyframes entrance {
    0%   { opacity: 0; transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1.0); }
  }
  @keyframes pulse {
    0%   { opacity: 1;    transform: scale(1.0); }
    40%  { opacity: 0.88; transform: scale(1.012); }
    70%  { opacity: 1;    transform: scale(1.0); }
    85%  { opacity: 0.92; transform: scale(1.008); }
    100% { opacity: 1;    transform: scale(1.0); }
  }

  #flash {
    position: fixed; inset: 0; pointer-events: none;
    background: rgba(160,0,0,0.0);
    animation: redflash 5s ease-in-out 1.8s infinite;
  }
  @keyframes redflash {
    0%   { opacity: 0; }
    55%  { opacity: 0; }
    62%  { opacity: 0.18; }
    68%  { opacity: 0; }
    80%  { opacity: 0.12; }
    86%  { opacity: 0; }
    100% { opacity: 0; }
  }

  #scanlines {
    position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
    );
    opacity: 0.6;
  }

  #vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 88% 85% at 50% 50%, transparent 55%, rgba(0,0,0,0.65) 100%);
  }

  #back {
    position: fixed; top: 1.5rem; left: 1.5rem;
    font-family: Georgia, serif; font-size: 0.8rem;
    color: rgba(255,255,255,0.25); text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  #back:hover { color: rgba(255,255,255,0.7); }
</style>
